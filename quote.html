<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get A Quote - WebsiteMax</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
</head>
<body>
<header>
<div class="container">
<div class="logo">WebsiteMax</div>
<nav class="nav-links" id="navLinks">
<a href="index.html#home">Home</a>
<a href="index.html#about">About</a>
<a href="index.html#services">Services</a>
<a href="index.html#pricing">Pricing</a>
<a href="index.html#projects">Projects</a>
<a href="index.html#inspirations">Designs</a>
<a href="index.html#faq">FAQ</a>
<a href="index.html#reviews">Reviews</a>
<a href="index.html#contact">Contact</a>
</nav>
<button class="nav-toggle" id="navToggle">☰</button>
<button class="dark-toggle" id="darkToggle">🌙</button>
</div>
</header>

<main style="padding:100px 20px; text-align:center;">
  <h2>Get A Quote</h2>
  <p>Tell us about your project and we'll get back to you with a custom quote.</p>
  <form id="quoteForm" style="max-width:500px; margin:0 auto; text-align:left;">
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" required>
    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required>
    <label for="message">Project Details:</label>
    <textarea id="message" name="message" rows="5" required></textarea>
    <button type="submit" class="choose-plan">Submit Quote Request</button>
  </form>
</main>

<footer>
<p>© 2026 WebsiteMax | Premium Websites for Small Businesses</p>
<div class="footer-credit">Designs by Kaleb</div>
</footer>

<button id="scrollTopBtn" class="scroll-top">▲</button>

<script>
  const quoteForm = document.getElementById('quoteForm');
  if(quoteForm){
    quoteForm.addEventListener('submit', e => {
      e.preventDefault();
      alert('Thank you! We\'ll get back to you soon.');
      quoteForm.reset();
    });
  }
</script>
</body>
</html>
